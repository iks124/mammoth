project: Online Teleportation for Continual Learning
question: >
  Can mid-training gradient conflict detection + LoRA teleportation reduce
  catastrophic forgetting in continual learning by finding loss-equivalent
  parameter configurations with better gradient alignment?

phase: conclude
status: H11_complete

last_updated: 2026-04-19

# ──────────────────────────────────────────────
# Results summary
# ──────────────────────────────────────────────
baselines:
  ER_10ep: 58.53%
  ER_50ep: 61.66%
  SGD_base: 19.45%

breakthrough:
  experiment: H10_E_rank4_lt200_lr001
  result: "61.18% (+2.65% over ER baseline)"
  key_param: "teleport_lr=0.001 (not 0.01)"
  mechanism: "Small lr → delta_norm=0.32, lt=0.035, cos+rate=91.3%"

experiments:
  H7_online:
    best: "E5 freq=10 → 56.90% (-1.63%)"
    verdict: broken_with_lr001
    root_cause: "teleport_lr=0.01 → delta_norm=7-30 → disrupts other batches"
  H8_hypothesis:
    finding: "cos_sim conflict ubiquitous (79% steps), r=-0.25 with forgetting"
    verdict: "gradient conflict is background noise, not discriminating signal"
  H9_rank:
    finding: "rank=8 → 29.13% (worse!); delta_norm scales with rank"
    verdict: "rank not the bottleneck; teleport_lr is"
  H10_lr_sweep:
    finding: "teleport_lr=0.001 → +2.65%; rank=4 vs 8 equivalent"
    freq_puzzle: "freq=1 (7358 triggers) = freq=10 (755 triggers) in accuracy"
    verdict: breakthrough
  H11_sgd:
    SGD_base: "19.45%"
    SGD_f10: "19.56% (+0.11%)"
    mechanism_check: "cos+rate=86.7%, lt=0.044 — mechanism works!"
    verdict: "batch mismatch NOT cause; old-task gradient noise is root cause"
    conclusion: "teleportation requires knowledge preservation (replay); standalone = noise"

# ──────────────────────────────────────────────
# Final conclusion
# ──────────────────────────────────────────────
conclusion: >
  Online LoRA teleportation (with teleport_lr=0.001) provides +2.65% improvement
  over ER baseline when combined with experience replay. The mechanism works correctly
  (91% cos+ rate, lt≈0.035, delta_norm≈0.32). However:

  1. Requires replay: SGD+teleport gives only +0.11% because old-task gradient is noise
     without knowledge preservation
  2. Frequency doesn't scale: each correction is +0.027 cos_sim → too small to accumulate
  3. Best result (61.30%) approaches but doesn't exceed 50-epoch ER baseline (61.66%)

  Teleportation is a second-order complement to replay, not a standalone CL technique.

