project: teleport-cl
question: "能否用 Symmetry Teleportation (COST 方法) 减少 CL 中的灾难性遗忘？"
started: 2026-04-14

phase: inner_loop
current_hypothesis: H6

hypotheses:
  H1:
    name: "COST-CL：LoRA teleportation for CL"
    status: implementing  # pending / implementing / running / done
    prediction: "均值 Class-IL > 45.64%，多 seed 稳定"
    method: |
      - LoRA rank=4 附在 shared backbone 的 Linear/Conv 层
      - 目标：L_lora = L_t - γ * L_g
        - L_t = mean(|L_old(θ+Δθ) - L_old(θ)|)  on old task memory
        - L_g = sharpness proxy on new task data (random perturbation)
      - 触发：每个任务 t>=1 的训练前
      - merge LoRA 后 commit 到网络，不改变推理结构
    result: null

  H2:
    name: "HTR 策略"
    status: pending
    depends_on: H1
    prediction: "H1基础上 +1~2%"
    result: null

  H3:
    name: "触发条件：冲突检测"
    status: superseded_by_H6
    depends_on: H1
    result: null

  H6:
    name: "Online Gradient Conflict Detection + Teleportation（训练中在线 teleport）"
    status: implementing
    prediction: "均值 Class-IL > 45.64%（baseline），多 seed 方差 < 3%"
    rationale: |
      - 之前所有方案都在 task boundary 执行单次 teleportation，违反了漏洞5：
        零阶保证无法覆盖整个训练轨迹。
      - 本方案：在 task t 的训练中，每 k 步检测 cos_sim(g_new, g_old)；
        若 < τ 则触发小步 LoRA teleportation（5 步），解决局部冲突后继续训练。
      - 这与 COST/BOOST 把 teleportation 整合进优化过程的思路一致。
      - 关键区别：每次 LoRA delta 极小（5步 vs 50步），L_t 约束确保不破坏当前状态。
    method: |
      - 用 ER buffer 作为 old-task 样本（避免额外内存）
      - 每 teleport_check_freq=50 步：
        1. 从 ER buffer 采样 batch_old（32样本）
        2. 用当前 training batch 作为 batch_new
        3. 各做一次 forward+backward，计算 cos_sim(g_old, g_new)
        4. 若 cos_sim < teleport_conflict_threshold（默认 0）：触发 teleportation
      - Mini LoRA teleportation（teleport_online_steps=5）：
        - 目标：L_t（loss invariance on old+new）- γ * cos_sim
        - LoRA rank=2，lr=1e-3，reg=0.01
        - merge 后继续正常训练
      - 如果速度过慢：只用 last conv layer 计算梯度（近似）
    approximations:
      - 只检测最后 2 层的梯度（而非全网络），速度提升 ~10x
      - 检测频率 k=50（不是每步）
      - LoRA rank=2，steps=5（比 H1b 的 rank=4，steps=50 小 10x）
    params:
      teleport_mode: online
      teleport_check_freq: 50
      teleport_online_steps: 5
      teleport_conflict_threshold: 0.0
      teleport_lora_rank: 2
      teleport_lr: 1e-3
      teleport_reg: 0.01
      teleport_lt_weight: 1.0
    result:
      seeds: [42, 1, 2, 3]
      class_il: [53.96, 48.51, 41.57, 44.15]
      mean: 47.05
      std: 5.43
      delta_vs_baseline: +1.41%
      verdict: "正均值，但方差爆炸（5.43% vs 1.34%）。与 H5 相同的高方差失败模式。需要减少 teleportation 频率/幅度。"
    status: done

baselines:
  no_teleport_multi_seed:
    config: "ER, seq-cifar10, n_epochs=1, buffer=500, lr=0.1"
    seeds: [42, 1, 2, 3]
    class_il: [43.71, 45.83, 45.96, 47.04]
    mean: 45.64
    std: 1.34

next_steps:
  - "实现 teleport_lora_online + detect_gradient_conflict 到 utils/teleportation.py"
  - "在 utils/training.py 的 train_single_epoch 中集成在线 teleportation"
  - "commit protocol: H6，跑 seeds 42/1/2/3，记录结果"

key_files:
  - utils/teleportation.py   # teleportation 核心实现
  - utils/training.py        # 训练循环集成点
  - research/findings.md     # 研究叙事
  - research/research-state.yaml  # 本文件

